# Text-to-image retrieval: CLIP ViT-B/32 on RSICD (satellite imagery)
# CLIP wasn't trained on satellite images — fine-tuning shows clear gains
# Usage: khoji multimodal configs/clip_rsicd_full.yaml
model:
  name: openai/clip-vit-base-patch32
  adapter_path: null
  dtype: null
  lora_target: both

data:
  dataset: arampacha/rsicd
  split: train
  negatives: mixed
  n_negatives: 3
  n_random: 2
  n_hard: 1
  n_queries: null
  corpus_size: null
  top_k: 50
  skip_top: 0
  mining_rounds: 1
  cache_dir: null

lora:
  r: 16
  alpha: 32
  dropout: 0.1
  target_modules: null

train:
  epochs: 3
  batch_size: 16
  grad_accum_steps: 2
  lr: 2e-5
  weight_decay: 0.01
  warmup_steps: 100
  max_grad_norm: 1.0
  max_length: 77
  loss: infonce
  margin: 0.2
  temperature: 0.05
  mixed_precision: null
  overfit_batches: null
  sanity_check_samples: 10
  save_every_n_steps: null
  keep_all_checkpoints: false

seed: 42

eval:
  dataset: null
  k_values: [1, 5, 10]
  split: test
  n_queries: null
  corpus_size: null
  run_before: true
  run_after: true

output_dir: ./forge-output/clip-rsicd-full
