# Full training config for text-to-image retrieval
# Usage: khoji multimodal flickr30k_full.yaml
model:
  name: openai/clip-vit-base-patch32
  adapter_path: null
  dtype: null
  lora_target: both        # "vision", "text", or "both"

data:
  dataset: nlphuji/flickr30k
  split: train
  negatives: hard
  n_negatives: 3
  n_queries: null          # all queries
  corpus_size: null        # full corpus
  top_k: 50
  skip_top: 0
  mining_rounds: 1
  cache_dir: ./image-cache # cache downloaded images locally

# Set to null for full fine-tuning: lora: null
lora:
  r: 16
  alpha: 32
  dropout: 0.1
  target_modules: null

train:
  epochs: 5
  batch_size: 32
  grad_accum_steps: 1
  lr: 2e-5
  weight_decay: 0.01
  warmup_steps: 100
  max_grad_norm: 1.0
  max_length: 77
  loss: infonce
  margin: 0.2
  temperature: 0.05
  mixed_precision: bf16
  overfit_batches: null
  sanity_check_samples: 10
  save_every_n_steps: 200
  keep_all_checkpoints: false

seed: 42

eval:
  dataset: null
  k_values: [1, 5, 10]
  split: test
  n_queries: null
  corpus_size: null
  run_before: true
  run_after: true

output_dir: ./forge-output/flickr30k-full
