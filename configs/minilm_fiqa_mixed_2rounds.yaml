# MiniLM on FiQA — weaker model with room to improve
# Mixed negatives (2 random + 1 hard), 2 mining rounds, InfoNCE loss
model:
  name: sentence-transformers/all-MiniLM-L6-v2
  dtype: null

data:
  dataset: fiqa
  split: train
  negatives: mixed
  n_random: 2
  n_hard: 1
  n_queries: null
  corpus_size: null
  top_k: 50
  mining_rounds: 2

lora:
  r: 16
  alpha: 32
  dropout: 0.1
  target_modules: null

train:
  epochs: 3
  batch_size: 32
  grad_accum_steps: 1
  lr: 2e-5
  weight_decay: 0.01
  warmup_steps: 50
  max_grad_norm: 1.0
  max_length: 512
  loss: infonce
  margin: 0.2
  temperature: 0.05
  mixed_precision: null
  sanity_check_samples: 10

seed: 42

eval:
  k_values: [1, 5, 10]
  split: test
  n_queries: null
  corpus_size: null
  run_before: true
  run_after: true

output_dir: ./forge-output/minilm-fiqa-mixed-2rounds
