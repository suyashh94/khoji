# Text-to-text retrieval: MiniLM on SciFact
# A smaller model (22M params) fine-tuned on scientific claim verification
# Usage: khoji configs/minilm_scifact_full.yaml
model:
  name: sentence-transformers/all-MiniLM-L6-v2
  adapter_path: null
  dtype: null

data:
  dataset: scifact
  split: train
  negatives: mixed
  n_negatives: 3
  n_random: 2
  n_hard: 1
  n_queries: null
  corpus_size: null
  top_k: 50
  skip_top: 0
  mining_rounds: 1

lora:
  r: 16
  alpha: 32
  dropout: 0.1
  target_modules: null

train:
  epochs: 5
  batch_size: 16
  grad_accum_steps: 1
  lr: 2e-5
  weight_decay: 0.01
  warmup_steps: 50
  max_grad_norm: 1.0
  max_length: 512
  loss: infonce
  margin: 0.2
  temperature: 0.05
  mixed_precision: null
  overfit_batches: null
  sanity_check_samples: 10
  save_every_n_steps: null
  keep_all_checkpoints: false

seed: 42

eval:
  dataset: null
  k_values: [1, 5, 10]
  split: test
  n_queries: null
  corpus_size: null
  run_before: true
  run_after: true

output_dir: ./forge-output/minilm-scifact-full
