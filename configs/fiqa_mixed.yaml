# Mixed negatives: random (easy) + hard (challenging) for balanced training
model:
  name: BAAI/bge-base-en-v1.5
  dtype: bf16

data:
  dataset: fiqa
  split: train
  negatives: mixed
  n_random: 2               # 2 random negatives per (query, positive) pair
  n_hard: 1                 # 1 hard negative per (query, positive) pair
  n_queries: null
  corpus_size: null
  top_k: 50
  skip_top: 0
  mining_rounds: 1         # iterative mining rounds (hard/mixed only)

lora:
  r: 16
  alpha: 32
  dropout: 0.1
  target_modules: [query, key, value, dense]

train:
  epochs: 2
  batch_size: 32
  grad_accum_steps: 1
  lr: 2e-5
  weight_decay: 0.01
  warmup_steps: 100
  max_grad_norm: 1.0
  max_length: 512
  loss: infonce
  margin: 0.2
  temperature: 0.05
  mixed_precision: bf16
  sanity_check_samples: 10

seed: 42

eval:
  k_values: [1, 5, 10]
  split: test
  n_queries: null
  corpus_size: null
  run_before: true
  run_after: true

output_dir: ./forge-output/fiqa-mixed
