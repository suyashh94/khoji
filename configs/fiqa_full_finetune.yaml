model:
  name: BAAI/bge-base-en-v1.5
  dtype: bf16

data:
  dataset: fiqa
  split: train
  negatives: hard
  n_negatives: 5
  n_queries: null
  corpus_size: null
  top_k: 50
  mining_rounds: 2

lora: null

train:
  epochs: 3
  batch_size: 32
  grad_accum_steps: 1
  lr: 5e-6
  weight_decay: 0.1
  warmup_steps: 100
  max_grad_norm: 1.0
  max_length: 512
  loss: infonce
  margin: 0.2
  temperature: 0.05
  mixed_precision: bf16
  sanity_check_samples: 10

seed: 42

eval:
  k_values: [1, 5, 10]
  split: test
  n_queries: null
  corpus_size: null
  run_before: true
  run_after: true

output_dir: ./forge-output/fiqa-full-finetune
